version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pullrabbit-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pullrabbit
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pullrabbit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pullrabbit-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: